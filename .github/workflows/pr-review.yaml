name: AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >-
      github.event.issue.pull_request &&
      (github.event.comment.body == '/review' ||
       github.event.comment.body == '/review fast' ||
       github.event.comment.body == '/review deep' ||
       github.event.comment.body == '/review tests' ||
       github.event.comment.body == '/review docs' ||
       github.event.comment.body == '/review stats')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        if: contains(github.event.comment.body, 'stats')
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --require-hashes -r .github/requirements-pr-review.txt

      - name: Determine review mode
        id: mode
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          case "$COMMENT_BODY" in
            "/review deep")  echo "mode=deep" >> "$GITHUB_OUTPUT" ;;
            "/review tests") echo "mode=tests" >> "$GITHUB_OUTPUT" ;;
            "/review docs")  echo "mode=docs" >> "$GITHUB_OUTPUT" ;;
            "/review stats") echo "mode=stats" >> "$GITHUB_OUTPUT" ;;
            *)               echo "mode=fast" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run PR review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_REVIEW_MODEL_FAST: ${{ secrets.PR_REVIEW_MODEL_FAST }}
          PR_REVIEW_MODEL_DEEP: ${{ secrets.PR_REVIEW_MODEL_DEEP }}
          REVIEW_MODE: ${{ steps.mode.outputs.mode }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: python scripts/pr-review.py
