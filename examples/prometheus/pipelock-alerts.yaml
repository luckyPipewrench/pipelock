# Pipelock Prometheus Alert Rules
#
# Copy this file into your Prometheus rules directory or include it via
# the PrometheusRule CRD if running the Prometheus Operator.
#
# Adjust thresholds and `for` durations to match your environment.
# All rules use $labels.instance to identify which pipelock instance fired.

groups:
  - name: pipelock
    rules:
      # --- Traffic Anomalies ---

      - alert: PipelockHighBlockRate
        expr: rate(pipelock_requests_total{result="blocked"}[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High block rate on {{ $labels.instance }}"
          description: >-
            Pipelock is blocking more than 10 requests/sec over a 5-minute
            window. This may indicate a misconfigured agent or an active
            exfiltration attempt.

      - alert: PipelockTunnelRejections
        expr: rate(pipelock_tunnels_total{result="blocked"}[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Elevated tunnel rejections on {{ $labels.instance }}"
          description: >-
            CONNECT tunnels are being blocked at a sustained rate. Check if the
            domain allowlist needs updating or if an agent is trying to reach
            unauthorized hosts.

      # --- Security Events ---

      - alert: PipelockKillSwitchActive
        expr: increase(pipelock_kill_switch_denials_total[1m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Kill switch denying traffic on {{ $labels.instance }}"
          description: >-
            The emergency kill switch is active and denying all traffic.
            Transport: {{ $labels.transport }}, endpoint: {{ $labels.endpoint }}.

      - alert: PipelockChainDetection
        expr: increase(pipelock_chain_detections_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Tool call chain attack detected on {{ $labels.instance }}"
          description: >-
            Chain detection fired: pattern={{ $labels.pattern }},
            severity={{ $labels.severity }}, action={{ $labels.action }}.

      - alert: PipelockScannerHitsSpike
        expr: rate(pipelock_scanner_hits_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Scanner hit spike on {{ $labels.instance }}"
          description: >-
            Scanner {{ $labels.scanner }} is triggering at an elevated rate.
            Investigate whether this is a real threat or a false positive
            pattern that needs suppression.

      - alert: PipelockWSBlocked
        expr: increase(pipelock_ws_scan_hits_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket scan hit on {{ $labels.instance }}"
          description: >-
            Scanner {{ $labels.scanner }} detected suspicious content in a
            WebSocket frame. Review the agent's WebSocket traffic.

      # --- Session Profiling ---

      - alert: PipelockSessionEscalation
        expr: increase(pipelock_session_escalations_total{to="block"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Session threat score reached block level on {{ $labels.instance }}"
          description: >-
            A session's threat score escalated from {{ $labels.from }} to block
            due to sustained anomalous behavior. In v1 this is an observability
            event; enforcement behavior is not automatically changed.

      - alert: PipelockHighAnomalyRate
        expr: rate(pipelock_session_anomalies_total[10m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated anomaly rate on {{ $labels.instance }}"
          description: >-
            Behavioral anomalies (type={{ $labels.type }}) are occurring at a
            sustained rate. This may precede an enforcement escalation.

      # --- Operational Health ---

      - alert: PipelockDown
        expr: up{job=~".*pipelock.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Pipelock instance {{ $labels.instance }} is down"
          description: >-
            Prometheus cannot scrape metrics from this pipelock instance.
            The agent firewall may be offline, leaving the agent unprotected.

      - alert: PipelockHighTunnelCount
        expr: pipelock_active_tunnels > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High active tunnel count on {{ $labels.instance }}"
          description: >-
            {{ $value }} active CONNECT tunnels. This may indicate connection
            leaking or an unusual traffic pattern.

      - alert: PipelockSessionEvictions
        expr: rate(pipelock_sessions_evicted_total[10m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sessions being evicted on {{ $labels.instance }}"
          description: >-
            Session tracking is evicting entries at a sustained rate. Consider
            increasing session capacity or TTL if this is expected traffic.

      # --- DLP (Request Body / Header) ---

      - alert: PipelockBodyDLPHit
        expr: increase(pipelock_body_dlp_hits_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Request body DLP hit on {{ $labels.instance }}"
          description: >-
            Secret detected in an outbound request body (action={{ $labels.action }}).
            This is a credential exfiltration attempt via POST/PUT payload.

      - alert: PipelockHeaderDLPHit
        expr: increase(pipelock_header_dlp_hits_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Request header DLP hit on {{ $labels.instance }}"
          description: >-
            Secret detected in an outbound HTTP header (action={{ $labels.action }}).
            Credentials may be leaking via non-Authorization headers.

      # --- TLS Interception ---

      - alert: PipelockTLSHandshakeErrors
        expr: rate(pipelock_tls_intercept_total{outcome="handshake_error"}[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "TLS handshake errors on {{ $labels.instance }}"
          description: >-
            TLS interception handshake failures are occurring at a sustained rate.
            Check CA certificate trust and upstream TLS configuration.

      - alert: PipelockTLSRequestBlocked
        expr: increase(pipelock_tls_request_blocked_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Request blocked inside TLS tunnel on {{ $labels.instance }}"
          description: >-
            DLP or authority check blocked a request inside an intercepted HTTPS
            tunnel (reason={{ $labels.reason }}). The agent is attempting to
            exfiltrate data through encrypted channels.

      - alert: PipelockTLSResponseBlocked
        expr: increase(pipelock_tls_response_blocked_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Response blocked inside TLS tunnel on {{ $labels.instance }}"
          description: >-
            Injection or policy violation detected in a response inside an
            intercepted HTTPS tunnel (reason={{ $labels.reason }}).

      # --- Cross-Request Detection ---

      - alert: PipelockEntropyBudgetExceeded
        expr: increase(pipelock_cross_request_entropy_exceeded_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Entropy budget exceeded on {{ $labels.instance }}"
          description: >-
            An agent is transmitting high-entropy data across multiple requests,
            exceeding the configured bits-per-window budget. This is a strong
            indicator of chunked secret exfiltration.

      - alert: PipelockFragmentDLPMatch
        expr: increase(pipelock_cross_request_dlp_match_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Fragment reassembly DLP match on {{ $labels.instance }}"
          description: >-
            A secret was detected after reassembling fragments from multiple
            requests. The agent is splitting credentials across requests to
            evade single-request DLP scanning.

      # --- Adaptive Enforcement ---

      - alert: PipelockHighEscalatedSessions
        expr: sum(pipelock_adaptive_sessions_current{level=~"block|critical"}) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Sessions at block/critical level on {{ $labels.instance }}"
          description: >-
            {{ $value }} session(s) have been escalated to block or critical
            enforcement level due to sustained anomalous behavior.

      # --- Scan API ---

      - alert: PipelockScanAPIErrors
        expr: rate(pipelock_scan_api_errors_total[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Scan API errors on {{ $labels.instance }}"
          description: >-
            The Scan API is returning errors at a sustained rate
            (kind={{ $labels.kind }}, code={{ $labels.error_code }}).
            External integrations may be sending malformed requests.

      - alert: PipelockScanAPIHighLatency
        expr: histogram_quantile(0.95, rate(pipelock_scan_api_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Scan API p95 latency above 1s on {{ $labels.instance }}"
          description: >-
            Scan API response times are elevated. Check for large payloads
            or resource contention.
