apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduled-scan
  namespace: cron
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: scheduled-scan
        spec:
          restartPolicy: Never
          containers:
            - name: scanner
              image: scheduled-scan:latest
