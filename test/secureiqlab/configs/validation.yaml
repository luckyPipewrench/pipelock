# Pipelock config — SecureIQLab AI Security CyberRisk Validation
#
# Maximum security posture. Every scanning feature enabled, action: block.
# Emission to log-collector for evidence capture.
#
# This config is used during SecureIQLab's independent validation testing.
# Results published at Black Hat USA 2026.

version: 1
mode: enforce

# ── Forward Proxy ─────────────────────────────────────────────
# SOCx platform sends traffic through this via HTTPS_PROXY=http://pipelock:8888
forward_proxy:
  enabled: true
  max_tunnel_seconds: 300
  idle_timeout_seconds: 120
  sni_verification: true

# ── Fetch Proxy ───────────────────────────────────────────────
fetch_proxy:
  listen: "0.0.0.0:8888"
  timeout_seconds: 30
  max_response_mb: 10
  user_agent: "Pipelock Fetch/1.0"
  monitoring:
    max_url_length: 500
    entropy_threshold: 3.5
    max_requests_per_minute: 120
    blocklist:
      - "*.pastebin.com"
      - "*.hastebin.com"
      - "*.paste.ee"
      - "*.transfer.sh"
      - "*.file.io"
      - "*.requestbin.com"

# ── WebSocket Proxy ───────────────────────────────────────────
websocket_proxy:
  enabled: true
  max_message_bytes: 1048576
  max_concurrent_connections: 128
  scan_text_frames: true
  allow_binary_frames: false
  forward_cookies: false
  strip_compression: true
  max_connection_seconds: 3600
  idle_timeout_seconds: 300
  origin_policy: rewrite

# ── Request Body Scanning ─────────────────────────────────────
request_body_scanning:
  enabled: true
  action: block
  max_body_bytes: 5242880
  scan_headers: true
  header_mode: all
  sensitive_headers:
    - Authorization
    - Cookie
    - X-Api-Key
    - X-Token
    - Proxy-Authorization
    - X-Goog-Api-Key

# ── TLS Interception ─────────────────────────────────────────
# Enables HTTPS inspection. CA generated by tls-init service.
tls_interception:
  enabled: true
  ca_cert: /etc/pipelock/tls/ca.crt
  ca_key: /etc/pipelock/tls/ca.key
  cert_ttl: 24h
  cert_cache_size: 10000
  max_response_bytes: 5242880

# ── DLP (Data Loss Prevention) ────────────────────────────────
# All 46 default patterns + validators. Env scanning disabled (avoids
# false positives on container environment variables in the test harness).
dlp:
  include_defaults: true
  scan_env: false

# ── Canary Tokens ─────────────────────────────────────────────
# Synthetic secrets planted in the test environment. If these appear in
# ANY outbound request, it's irrefutable proof of compromise.
canary_tokens:
  enabled: true
  tokens:
    - name: "aws_canary"
      value: "AKIAIOSFODNN7CANARY1"
    - name: "db_canary"
      value: "postgres://canary:trap@honeypot.internal/fake"
    - name: "api_canary"
      value: "sk-canary-4eC39HqLyjWDarjtT1zdp7dc"

# ── Response / Injection Scanning ─────────────────────────────
# All default patterns (19 patterns, 6-pass normalization).
response_scanning:
  enabled: true
  action: block
  include_defaults: true

# ── MCP Input Scanning ────────────────────────────────────────
mcp_input_scanning:
  enabled: true
  action: block
  on_parse_error: block

# ── MCP Tool Scanning ────────────────────────────────────────
mcp_tool_scanning:
  enabled: true
  action: block
  detect_drift: true

# ── MCP Tool Policy ──────────────────────────────────────────
mcp_tool_policy:
  enabled: true
  action: block
  rules:
    - name: "Destructive File Delete"
      tool_pattern: '(?i)^(bash|shell|exec|run_command|execute|terminal|bash_exec)$'
      arg_pattern: '(?i)\brm\s+(--\s+)?(-[a-z]*[rf]\b|--(?:recursive|force)\b)'
      action: block
    - name: "Credential File Access"
      tool_pattern: '(?i)^(bash|shell|exec|run_command|execute|terminal|bash_exec|read_file|file_read)$'
      arg_pattern: '(?i)(\.ssh/(id_|authorized)|\.aws/credentials|\.env\b|\.netrc|/etc/shadow)'
      action: block
    - name: "Network Exfiltration"
      tool_pattern: '(?i)^(bash|shell|exec|run_command|execute|terminal|bash_exec)$'
      arg_pattern: '(?i)\b(curl|wget)\b.*(-d\s|--data|--upload-file|-T\s|-X\s+POST|--post-data)'
      action: block
    - name: "Reverse Shell"
      tool_pattern: '(?i)^(bash|shell|exec|run_command|execute|terminal|bash_exec)$'
      arg_pattern: '(?i)(bash\s+-i\s+>&|/dev/tcp/|mkfifo\s+|nc\s+-e|ncat\s+-e)'
      action: block
    - name: "Encoded Command Execution"
      tool_pattern: '(?i)^(bash|shell|exec|run_command|execute|terminal|bash_exec)$'
      arg_pattern: '(?i)(\beval\b.*\bbase64\b|\bbase64\s+(-d|--decode)\b.*\|\s*(ba)?sh\b)'
      action: block
    - name: "Package Install"
      tool_pattern: '(?i)^(bash|shell|exec|run_command|execute|terminal|bash_exec)$'
      arg_pattern: '(?i)\b(pip|npm|gem|cargo|go)\s+install\b'
      action: block

# ── MCP Session Binding ──────────────────────────────────────
mcp_session_binding:
  enabled: true

# ── Tool Chain Detection ─────────────────────────────────────
tool_chain_detection:
  enabled: true
  action: block

# ── Cross-Request Detection ──────────────────────────────────
cross_request_detection:
  enabled: true
  action: block
  entropy_budget:
    enabled: true
    bits_per_window: 4096
    window_minutes: 5
    action: warn
  fragment_reassembly:
    enabled: true
    max_buffer_bytes: 65536
    window_minutes: 5

# ── Seed Phrase Detection ────────────────────────────────────
seed_phrase_detection:
  enabled: true
  min_words: 12
  verify_checksum: true

# ── Session Profiling ────────────────────────────────────────
session_profiling:
  enabled: true

# ── Adaptive Enforcement ─────────────────────────────────────
# Aggressive escalation: low threshold, slow decay.
adaptive_enforcement:
  enabled: true
  escalation_threshold: 3.0
  decay_per_clean_request: 0.25
  levels:
    elevated:
      upgrade_warn: block
      upgrade_ask: block
    high:
      upgrade_warn: block
      upgrade_ask: block
    critical:
      upgrade_warn: block
      upgrade_ask: block
      block_all: true

# ── Flight Recorder ──────────────────────────────────────────
# Tamper-evident evidence recording. Every verdict is logged.
flight_recorder:
  enabled: true
  dir: /var/lib/pipelock/recorder
  checkpoint_interval: 100
  retention_days: 30
  redact: true
  sign_checkpoints: true
  max_entries_per_file: 10000

# ── Behavioral Baseline ─────────────────────────────────────
behavioral_baseline:
  enabled: true
  learning_window: 5
  deviation_action: warn
  profile_dir: /var/lib/pipelock/profiles
  auto_ratify: false
  sensitivity_sigma: 2.0
  poison_resistance: true
  seasonality_mode: none

# ── SSRF Protection ──────────────────────────────────────────
internal:
  - "169.254.169.254/32"   # AWS/GCP metadata
  - "fd00::/8"             # IPv6 private
  # Note: internal container IPs (172.x) are NOT blocked so harness
  # containers can communicate. In production, add full RFC1918 ranges.

# Harness containers are on the Docker bridge network — trust them.
trusted_domains:
  - "mock-llm"
  - "mock-mcp"
  - "log-collector"

# ── Logging ───────────────────────────────────────────────────
# JSON to stdout. SecureIQLab penalizes products that block without logging.
logging:
  format: json
  output: stdout
  include_allowed: true
  include_blocked: true

# ── Event Emission ────────────────────────────────────────────
# Every detection event ships to the log collector for evidence.
emit:
  instance_id: "secureiqlab-validation"
  webhook:
    url: http://log-collector:9090/events
    min_severity: info
    timeout_seconds: 5
    queue_size: 256

# ── Prometheus Metrics ────────────────────────────────────────
metrics_listen: ":9100"

# ── Kill Switch ───────────────────────────────────────────────
# Available but not active. Can be triggered via sentinel file for testing.
kill_switch:
  sentinel_file: /tmp/pipelock-kill
  message: "Emergency deny-all active"

# ── Sentry ────────────────────────────────────────────────────
# Disabled in test harness — no crash reporting to external services.
sentry:
  enabled: false
